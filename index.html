<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio | Photography</title>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== 开幕幕布 ===== -->
  <div class="curtain" id="curtain">
    <div class="curtain-left"></div>
    <div class="curtain-right"></div>
    <div class="curtain-logo">MIRACLE</div>
  </div>

  <!-- ===== Canvas粒子层 ===== -->
  <canvas id="particles-canvas"></canvas>

  <!-- ===== 光标光晕 ===== -->
  <div class="cursor-glow" id="cursor-glow"></div>

  <!-- ===== Section 1: Hero ===== -->
  <section class="hero" id="hero">
    <div class="hero-overlay"></div>
    <div class="hero-slider" id="hero-slider">
      <!-- JS动态填充 slides -->
    </div>
    <div class="hero-content">
      <h1 class="hero-name">MIRACLE</h1>
      <p class="hero-subtitle">PHOTOGRAPHY</p>
      <div class="hero-divider"></div>
    </div>
    <div class="scroll-hint">
      <span>SCROLL</span>
      <div class="scroll-line"></div>
    </div>
  </section>

  <!-- ===== Section 2: Gallery ===== -->
  <section class="gallery" id="gallery">
    <div class="gallery-header">
      <h2 class="section-title">GALLERY</h2>
      <div class="gold-divider"></div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-tag="all">全部</button>
      <button class="filter-btn" data-tag="landscape">风光</button>
      <button class="filter-btn" data-tag="portrait">人像</button>
      <button class="filter-btn" data-tag="humanistic">人文</button>
      <button class="filter-btn" data-tag="anime">动漫</button>
      <button class="filter-btn" data-tag="drone">航拍</button>
      <button class="filter-btn" data-tag="street">街拍</button>
      <button class="filter-btn" data-tag="night">夜景</button>
    </div>
    <div class="gallery-grid" id="gallery-grid">
      <!-- JS动态填充 -->
    </div>
  </section>

  <!-- ===== Section 3: Social ===== -->
  <section class="social" id="social">
    <div class="gold-divider"></div>
    <h3 class="connect-title">CONNECT</h3>
    <div class="social-links">
      <a href="#" class="social-icon" title="抖音" id="social-douyin">
        <svg viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
      </a>
      <a href="mailto:#" class="social-icon" title="Email" id="social-email">
        <svg viewBox="0 0 24 24"><path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 010 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.91 1.528-1.145C21.69 2.28 24 3.434 24 5.457z"/></svg>
      </a>
    </div>
  </section>

  <!-- ===== Section 4: Footer ===== -->
  <footer class="footer">
    <p class="footer-copy">&copy; 2026 Miracle</p>
    <p class="footer-tagline">Capturing light, framing stories.</p>
  <a href="admin.html" style="font-size:10px;color:#333;margin-top:12px;display:inline-block;letter-spacing:1px;" title="管理后台">· MANAGE ·</a>
  </footer>

  <!-- ===== 灯箱 ===== -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-bg"></div>
    <button class="lightbox-close">&times;</button>
    <div class="lightbox-container">
      <img src="" alt="" id="lightbox-img">
      <p class="lightbox-caption" id="lightbox-caption"></p>
    </div>
  </div>

  <!-- ===== Custom JS ===== -->
  <script src="js/parallax.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
